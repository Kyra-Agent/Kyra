# Telegram connect is called by a signed-in dashboard user. Keep Supabase
# gateway JWT verification enabled in addition to the function's ownership
# validation.
[functions.telegram-connect]
verify_jwt = true

# Telegram dashboard status is called by a signed-in dashboard user. Keep
# Supabase gateway JWT verification enabled in addition to future function
# ownership validation and bounded status reads.
[functions.telegram-dashboard-status]
verify_jwt = true

# Chain-neutral status verification is server-to-server only. The function is
# default-off and authenticates with its own backend bearer secret.
[functions.chain-status-provider]
verify_jwt = false

# Chain-neutral preparation is owner-dashboard only and remains default-off.
[functions.chain-action-prepare]
verify_jwt = true

# Agent removal is owner-scoped and calls an atomic service-only RPC after
# validating the signed-in account session.
[functions.remove-agent]
verify_jwt = true

# Telegram disconnect is called by a signed-in dashboard user. Keep Supabase
# gateway JWT verification enabled in addition to future function ownership
# validation and operator action checks.
[functions.telegram-disconnect]
verify_jwt = true

# Telegram owner-link challenge issue requires a signed-in dashboard user.
# Keep gateway JWT verification enabled in addition to function ownership
# validation.
[functions.telegram-link]
verify_jwt = true

# Telegram calls this webhook without a Supabase JWT. The inert handler rejects
# a missing X-Telegram-Bot-Api-Secret-Token before body access; enabled live
# parsing additionally requires a successful backend session lookup.
[functions.telegram-webhook]
verify_jwt = false
